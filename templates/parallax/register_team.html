{% extends 'parallax/base.html' %}{% block content %}<main class="page-shell narrow"><h1 class="page-title">Create your <span>team.</span></h1><p class="lead">Your registration will be reviewed by the Organising Committee.</p><form method="post" class="form-card">{% csrf_token %}<label>Team name<input name="team_name" required></label><label>Challenge track<select name="track" required>{% for track in tracks %}{% if track.id %}<option value="{{ track.id }}">{{ track.name }}</option>{% endif %}{% endfor %}</select></label><label>Payment / invoice number <small>(if issued)</small><input name="invoice_number"></label><button class="btn-cta">Submit registration</button></form></main>{% endblock %}
